<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" fill="none">
  <defs>
    <radialGradient id="earth2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="70%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <marker id="arrowA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f472b6"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#fbbf24"/>
    </marker>
    <marker id="arrowD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="360" fill="#0a0e1a"/>

  <!-- Earth -->
  <circle cx="250" cy="180" r="100" fill="url(#earth2)" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Center dot -->
  <circle cx="250" cy="180" r="3" fill="#ff8c57"/>

  <!-- Surface normal A (top) -->
  <circle cx="250" cy="80" r="5" fill="#f472b6"/>
  <line x1="250" y1="76" x2="250" y2="30" stroke="#f472b6" stroke-width="2" marker-end="url(#arrowA)"/>
  <text x="262" y="40" fill="#f472b6" font-family="system-ui, sans-serif" font-size="12" font-weight="600">A</text>

  <!-- Surface normal B (right) -->
  <circle cx="350" cy="180" r="5" fill="#34d399"/>
  <line x1="354" y1="180" x2="400" y2="180" stroke="#34d399" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="406" y="184" fill="#34d399" font-family="system-ui, sans-serif" font-size="12" font-weight="600">B</text>

  <!-- Surface normal C (bottom) -->
  <circle cx="250" cy="280" r="5" fill="#fbbf24"/>
  <line x1="250" y1="284" x2="250" y2="330" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowC)"/>
  <text x="262" y="330" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12" font-weight="600">C</text>

  <!-- Surface normal D (left) -->
  <circle cx="150" cy="180" r="5" fill="#a78bfa"/>
  <line x1="146" y1="180" x2="100" y2="180" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowD)"/>
  <text x="82" y="184" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">D</text>

  <!-- Angle arc between A and B normals -->
  <path d="M 250 155 A 25 25 0 0 1 275 180" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <text x="268" y="162" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11">θ</text>

  <!-- Dashed lines from surface to center -->
  <line x1="250" y1="80" x2="250" y2="180" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.2"/>
  <line x1="350" y1="180" x2="250" y2="180" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.2"/>
  <line x1="250" y1="280" x2="250" y2="180" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.2"/>
  <line x1="150" y1="180" x2="250" y2="180" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.2"/>

  <!-- Caption -->
  <text x="250" y="350" fill="#8892a8" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Surface normals diverge from Earth's center — each location has a unique "up"</text>
</svg>
