<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <main class="content">
    <article class="project-detail">
      <h1>{{ page.title }}</h1>
      {% if page.tags %}
      <div class="tags">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
      {% if page.link %}
      <p><a href="{{ page.link }}" class="project-link">View Project &rarr;</a></p>
      {% endif %}
      {{ content }}
    </article>
  </main>
  {% include footer.html %}
</body>
</html>
